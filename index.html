<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
          rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen">
    <title>Todo App</title>
  </head>
  <body class="body">
    <div class="header">
      <img class="header__img" src="./eisenhower-matrix.jpg">
      <a class="header__link" 
         href="https://goal-life.com/page/method/matrix-eisenhower">
         Want more details?
      </a>
    </div>
    <div class="main">
      <p class="add-item">
        <label for="new-task" class="title add-item__title">Add Item</label>
        <div class="add-item__wrapper">
          <input class="add-item__text" id="new-task" type="text">
          <button class="button add-item__button">Add</button>
        </div>
      </p>
      <h3 class="title">Todo</h3>
      <ul class="list todo__list">
        <li class="item list__item">
          <input class="item__checkbox" type="checkbox">
          <label class="item__label">Pay Bills</label>
          <input class="item__text" type="text">
          <button class="button item__button-edit">Edit</button>
          <button class="button item__button-delete">
            <img class="item__img-delete" src="./remove.svg">
          </button>
        </li>
        <li class="item list__item list__item_edit-mode">
          <input class="item__checkbox" type="checkbox">
          <label class="item__label">Go Shopping</label>
          <input class="item__text" type="text" value="Go Shopping">
          <button class="button item__button-edit">Save</button>
          <button class="button item__button-delete">
            <img class="item__img-delete" src="./remove.svg">
          </button>
        </li>
      </ul>
      <h3 class="title">Completed</h3>
      <ul class="list completed__list">
        <li class="list__item item">
          <input class="item__checkbox" type="checkbox" checked>
          <label class="item__label">See the Doctor</label>
          <input class="item__text" type="text">
          <button class="button item__button-edit">Edit</button>
          <button class="button item__button-delete">
            <img class="item__img-delete" src="./remove.svg">
          </button>
        </li>
      </ul>
    </div>
    <script src="app.js"></script>
  </body>
</html>
